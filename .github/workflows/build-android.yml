name: Build Android APK

on:
  push:
    branches:
      - environment
      - master
      - "releases/**"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      - name: Install specific Android SDK components
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653" \
                     "cmdline-tools;latest"

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Install Gradle
        run: |
          GRADLE_VERSION=8.2
          if ! command -v gradle &> /dev/null || ! gradle --version 2>&1 | grep -q "Gradle $GRADLE_VERSION"; then
            curl -L -o /tmp/gradle.zip "https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
            sudo unzip -q /tmp/gradle.zip -d /opt
            sudo ln -sf "/opt/gradle-${GRADLE_VERSION}/bin/gradle" /usr/local/bin/gradle
          fi
          gradle --version

      - name: Show ANDROID_HOME and SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          ls -la "$ANDROID_HOME/platforms/" 2>/dev/null || echo "No platforms dir at ANDROID_HOME"
          ls -la "$ANDROID_SDK_ROOT/platforms/" 2>/dev/null || echo "No platforms dir at ANDROID_SDK_ROOT"
          ls -la "$ANDROID_HOME/ndk/" 2>/dev/null || echo "No ndk dir at ANDROID_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME" > local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "local.properties content:"
          cat local.properties

      - name: Build APK with Gradle
        run: |
          export ANDROID_HOME=${ANDROID_HOME:-$ANDROID_SDK_ROOT}
          cat local.properties
          gradle assembleDebug --no-daemon --stacktrace
        timeout-minutes: 15

      - name: Wait for 3 minutes before verification
        run: sleep 180

      - name: Verify APK exists and check size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat --format=%s "$APK_PATH")
            echo "APK found at $APK_PATH"
            echo "APK file size: $APK_SIZE bytes"
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
        shell: bash

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error