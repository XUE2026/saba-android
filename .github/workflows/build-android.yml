name: Build Android APK

on:
  push:
    branches:
      - environment
      - master
      - "releases/**"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      - name: Install specific Android SDK components
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653" \
                     "cmdline-tools;latest"

      - name: Install CMake and Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Show ANDROID_HOME and SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "sdk.dir=$SDK_PATH" > local.properties
          echo "ANDROID_HOME=$SDK_PATH" >> $GITHUB_ENV
          cat local.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build APK with Gradle wrapper
        run: |
          echo "Android SDK: $ANDROID_HOME"
          echo "Gradle wrapper will download Gradle 8.4 automatically"
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_build.log | tail -200
          GRADLE_EXIT=${PIPESTATUS[0]}
          echo "Exit code: $GRADLE_EXIT"
          exit $GRADLE_EXIT
        timeout-minutes: 30

      - name: Verify APK exists and check size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat --format=%s "$APK_PATH")
            echo "APK found at $APK_PATH"
            echo "APK file size: $APK_SIZE bytes"
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
        shell: bash

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error