name: Build Android APK

on:
  push:
    branches:
      - environment
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      - name: Install specific Android SDK components
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653" \
                     "cmdline-tools;latest"

      - name: Generate Gradle Wrapper
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          export ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT
          # Download Gradle and generate wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          # Make gradlew executable
          chmod +x gradlew

      - name: Build APK with Gradle
        run: ./gradlew assembleDebug

      - name: Wait for 3 minutes before verification
        run: sleep 180

      - name: Verify APK exists and check size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat --format=%s "$APK_PATH")
            echo "APK found at $APK_PATH"
            echo "APK file size: $APK_SIZE bytes"
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
        shell: bash

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error