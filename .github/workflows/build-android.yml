name: Build Android APK

on:
  push:
    branches:
      - environment
      - master
      - "releases/**"
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          log-accepted-android-sdk-licenses: true

      - name: Install specific Android SDK components
        run: |
          sdkmanager "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653" \
                     "cmdline-tools;latest"

      - name: Install CMake, Ninja and Bullet
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build libbullet-dev

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Bullet Physics for Android
        run: |
          NDK_PATH=$(ls -d /usr/local/lib/android/sdk/ndk/*/ 2>/dev/null | head -1)
          echo "Using NDK: $NDK_PATH"
          echo "BULLET_ANDROID_DIR=/tmp/bullet-android" >> $GITHUB_ENV

          if [ ! -d /tmp/bullet3 ]; then
            git clone --depth 1 --branch 3.25 https://github.com/bulletphysics/bullet3.git /tmp/bullet3
          fi
          cd /tmp/bullet3

          for ABI in arm64-v8a armeabi-v7a x86_64; do
            BUILD_DIR="build_${ABI}"
            if [ -f "${BUILD_DIR}/.completed" ]; then
              echo "Bullet already built for ${ABI}, skipping"
              continue
            fi
            mkdir -p "${BUILD_DIR}"
            cd "${BUILD_DIR}"
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE="${NDK_PATH}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI="${ABI}" \
              -DANDROID_PLATFORM=24 \
              -DCMAKE_INSTALL_PREFIX="/tmp/bullet-android/${ABI}" \
              -DBUILD_SHARED_LIBS=ON \
              -DBUILD_BULLET2_DEMOS=OFF \
              -DBUILD_BULLET3=OFF \
              -DBUILD_EXTRAS=OFF \
              -DBUILD_UNIT_TESTS=OFF \
              -DINSTALL_LIBS=ON \
              -DINSTALL_CMAKE_FILES=ON \
              -DUSE_GRAPHICAL_BENCHMARK=OFF
            cmake --build . --target install -j$(nproc)
            touch .completed
            cd ..
          done
          echo "Bullet Physics for Android built successfully"
        timeout-minutes: 15

      - name: Test Gradle project configuration
        run: |
          chmod +x ./gradlew
          ./gradlew projects --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_config.log
          echo "Project configuration: SUCCESS"
        timeout-minutes: 5

      - name: Build APK with Gradle
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/gradle_build.log
          exit ${PIPESTATUS[0]}
        timeout-minutes: 30

      - name: Extract and post build errors
        if: failure()
        run: |
          if [ -f /tmp/gradle_build.log ]; then
            {
              echo "## ❌ Android APK Build Failed"
              echo ""
              echo '```'
              grep -n -E "(ERROR|error:|FAILED|Error:|BUILD FAILED|What went wrong|cannot find|unresolved|fatal error|No such file|command not found)" /tmp/gradle_build.log | tail -50
              echo '```'
              echo ""
              echo "### Last 80 lines of build log"
              echo '```'
              tail -80 /tmp/gradle_build.log
              echo '```'
            } | tee /tmp/error_output.md
            cat /tmp/error_output.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Print build log tail (always)
        if: always()
        run: |
          for log in /tmp/gradle_config.log /tmp/gradle_build.log; do
            if [ -f "$log" ]; then
              echo "=== Last 50 lines of $(basename $log) ==="
              tail -50 "$log"
              echo "=== End of $(basename $log) ==="
            fi
          done

      - name: Upload Gradle build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-logs
          path: |
            /tmp/gradle_config.log
            /tmp/gradle_build.log
            /tmp/error_output.md
          if-no-files-found: warn

      - name: Verify APK exists and check size
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            APK_SIZE=$(stat --format=%s "$APK_PATH")
            echo "APK found at $APK_PATH"
            echo "APK file size: $APK_SIZE bytes"
          else
            echo "Error: APK not found at $APK_PATH"
            exit 1
          fi
        shell: bash

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error